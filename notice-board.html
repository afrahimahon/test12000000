<!-- CLEAN NOTICE BOARD COMPONENT -->
<div class="notice-board glass" style="margin-bottom:1.6rem;">
  <div class="g-f"></div><div class="g-o"></div><div class="g-s"></div>
  <div class="g-c nb-inner" style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; padding:10px 14px;">

    <span style="font-size:1.35rem;">📢</span>

    <select id="tagSelect" style="padding:5px 10px; border-radius:6px; background:rgba(214,54,81,0.1); border:1px solid #D63651; color:#D63651; font-weight:700;">
      <option>LIVE 🔥</option>
      <option>NEW ✨</option>
      <option>SOON 🚀</option>
      <option>UPDATE ❤️</option>
    </select>

    <span id="noticeText" style="flex:1; font-weight:500; font-size:0.92rem; color:var(--text-2,#B8B2A8);">
      EP 04 with BUET topper drops tomorrow 8 PM 🔥 Register now!
    </span>

    <button onclick="cycleNotice()" style="padding:6px 12px; background:none; border:1px solid var(--border); border-radius:50%; font-size:1.1rem;">↻</button>
    <button onclick="showAllNotices()" style="padding:6px 14px; font-size:0.78rem; background:rgba(214,54,81,0.15); border:none; border-radius:6px;">All ↓</button>
  </div>
</div>

<div id="allPanel" style="display:none; padding:14px; background:var(--bg-card); border-radius:14px; margin:8px 0;">
  <h4 style="color:#D63651; margin-bottom:10px;">📌 All Announcements</h4>
  <div id="listContainer"></div>
</div>

<script>
  const messages = [
    "EP 04 with BUET topper drops tomorrow 8 PM 🔥 Register now!",
    "Medical Admission Crash Course – Batch 2 registration open",
    "Prepway Android App Beta releasing 25 March 2026",
    "Website upgraded with separate notice board ❤️ Thank you for testing!",
    "HSC Preparation Series starts next week – Stay tuned!"
  ];
  let i = 0;

  function cycleNotice() {
    i = (i + 1) % messages.length;
    document.getElementById("noticeText").textContent = messages[i];
  }

  function showAllNotices() {
    let html = "";
    messages.forEach(msg => {
      html += `<p style="margin:8px 0; padding:6px; background:rgba(255,255,255,0.05); border-left:3px solid #D63651;">• ${msg}</p>`;
    });
    document.getElementById("listContainer").innerHTML = html;
    document.getElementById("allPanel").style.display = "block";
  }

  // Auto cycle + first load
  window.onload = () => {
    document.getElementById("noticeText").textContent = messages[0];
    setInterval(cycleNotice, 5800);
  };
</script>
